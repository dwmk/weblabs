<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dewan Mukto's Fractal Glass Background Generator</title>
<style>
  /* Base Reset */
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #020202;
    font-family: system-ui, -apple-system, sans-serif;
  }

  /* Canvas */
  #bg-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    transform: scale(1.15); 
  }

  /* Glass Overlay */
  #glass-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
    mix-blend-mode: overlay;
  }

  /* UI Controls Wrapper */
  .controls {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: rgba(20, 20, 20, 0.8);
    padding: 12px 20px;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: white;
    display: flex;
    gap: 10px;
    align-items: center;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.8);
  }

  .input-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  label {
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.6);
  }

  input {
    padding: 8px 12px;
    font-size: 14px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.5);
    color: white;
    outline: none;
    width: 140px;
    transition: border-color 0.2s;
  }

  input:focus {
    border-color: rgba(255,255,255,0.6);
  }

  button {
    padding: 8px 14px;
    font-size: 13px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }

  #btn-generate {
    background: #ffffff;
    color: #000000;
  }

  #btn-generate:hover {
    background: #dddddd;
  }

  #btn-copy {
    background: rgba(255, 255, 255, 0.1);
    color: #ffffff;
  }

  #btn-copy:hover {
    background: rgba(255, 255, 255, 0.2);
  }

  button:active {
    transform: scale(0.96);
  }
</style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>
  <div id="glass-overlay"></div>

  <div class="controls">
    <div class="input-wrapper">
      <label for="seed-input">Seed</label>
      <input type="text" id="seed-input" placeholder="Type anything..." autocomplete="off" spellcheck="false" />
    </div>
    <button id="btn-generate">Regenerate</button>
    <button id="btn-copy">Copy Code</button>
  </div>

<script>
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  const glassOverlay = document.getElementById('glass-overlay');
  const seedInput = document.getElementById('seed-input');
  let randomFunc;

  // Mulberry32 PRNG
  function mulberry32(a) {
    return function() {
      var t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
  }

  // String Hashing
  function generateHash(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = Math.imul(31, hash) + str.charCodeAt(i) | 0;
    }
    return hash;
  }

  // Generate a clean random 6-character string
  function makeRandomSeed() {
    return Math.random().toString(36).substring(2, 8);
  }

  // Engine core to compute background parameters & render canvas
  function draw() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const blurAmount = 20 + (randomFunc() * 60);
    canvas.style.filter = `blur(${blurAmount}px)`;

    const ridgeWidth = 3 + (randomFunc() * 15);
    const slopeUp = ridgeWidth * 0.3;
    const peak = ridgeWidth * 0.5;
    const slopeDown = ridgeWidth * 0.7;

    const specOpacity = 0.4 + (randomFunc() * 0.6);
    const grooveOpacity = 0.3 + (randomFunc() * 0.6);
    const contrast = 1.0 + (randomFunc() * 0.4); 
    const brightness = 0.9 + (randomFunc() * 0.4); 
    
    window.exportData = {
  blurAmount,
  ridgeWidth,
  specOpacity,
  grooveOpacity,
  contrast,
  brightness,
  shapes: []
};

    glassOverlay.style.background = `repeating-linear-gradient(
      to right,
      rgba(0, 0, 0, ${grooveOpacity}) 0px,
      rgba(0, 0, 0, 0.05) ${slopeUp}px,
      rgba(255, 255, 255, ${specOpacity}) ${peak}px,
      rgba(0, 0, 0, 0.05) ${slopeDown}px,
      rgba(0, 0, 0, ${grooveOpacity}) ${ridgeWidth}px
    )`;
    glassOverlay.style.backdropFilter = `contrast(${contrast}) brightness(${brightness})`;
    glassOverlay.style.webkitBackdropFilter = `contrast(${contrast}) brightness(${brightness})`;

    ctx.fillStyle = '#050508';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalCompositeOperation = 'screen';

    const numShapes = 3 + Math.floor(randomFunc() * 9);

    window.exportData.shapes = [];
    for (let i = 0; i < numShapes; i++) {
      const x = canvas.width * randomFunc();
      const y = canvas.height * 0.5; 
      const rx = 30 + randomFunc() * 150; 
      const ry = canvas.height + randomFunc() * canvas.height * 2; 

      const hue = Math.floor(randomFunc() * 360);
      const sat = 70 + randomFunc() * 30; 
      const lit = 30 + randomFunc() * 30;


      const auraGradient = ctx.createRadialGradient(x, y, 0, x, y, Math.max(rx, ry));
      auraGradient.addColorStop(0, `hsla(${hue}, ${sat}%, ${lit}%, 1)`);
      auraGradient.addColorStop(0.4, `hsla(${hue}, ${sat}%, ${lit}%, 0.8)`);
      auraGradient.addColorStop(1, `hsla(${hue}, ${sat}%, ${lit}%, 0)`);

      ctx.fillStyle = auraGradient;
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(rx / 100, ry / 100);
      ctx.beginPath();
      ctx.arc(0, 0, 100, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      const coreThicknessRatio = 0.1 + (randomFunc() * 0.3); 
      const coreOpacity = 0.6 + (randomFunc() * 0.4);

      const coreGradient = ctx.createRadialGradient(x, y, 0, x, y, Math.max(rx * coreThicknessRatio, ry));
      coreGradient.addColorStop(0, `hsla(${hue}, 20%, 95%, ${coreOpacity})`); 
      coreGradient.addColorStop(0.3, `hsla(${hue}, 50%, 80%, ${coreOpacity * 0.5})`);
      coreGradient.addColorStop(1, `hsla(${hue}, ${sat}%, ${lit}%, 0)`);

      ctx.fillStyle = coreGradient;
      ctx.save();
      ctx.translate(x, y);
      ctx.scale((rx * coreThicknessRatio) / 100, ry / 100); 
      ctx.beginPath();
      ctx.arc(0, 0, 100, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      
                    window.exportData.shapes.push({
          x,
          y,
          rx,
          ry,
          hue,
          sat,
          lit,
          coreThicknessRatio,
          coreOpacity
        });
    }
  }

  function init(seedStr) {
    const seedVal = generateHash(seedStr);
    randomFunc = mulberry32(seedVal);
    for(let i=0; i<10; i++) randomFunc(); 
    draw();
  }

  // Sync initialization state checking URL parameters
  function updateFromURL() {
    const urlParams = new URLSearchParams(window.location.search);
    let currentSeed = urlParams.get('seed');
    
    if (!currentSeed) {
      currentSeed = makeRandomSeed();
    }
    
    seedInput.value = currentSeed;
    init(currentSeed);
  }

  // --- EVENT LISTENERS ---

  // Real-time changes as you type
  seedInput.addEventListener('input', () => {
    const currentSeed = seedInput.value || "default";
    
    // Smoothly replace URL state to avoid expanding history stack on every keystroke
    const newUrl = `${window.location.protocol}//${window.location.host}${window.location.pathname}?seed=${encodeURIComponent(currentSeed)}`;
    window.history.replaceState({ path: newUrl }, '', newUrl);
    
    init(currentSeed);
  });

  // Regenerate Button Action
  document.getElementById('btn-generate').addEventListener('click', () => {
    const newSeed = makeRandomSeed();
    seedInput.value = newSeed;

    // Use pushState here because it is an intentional, explicit user action click
    const newUrl = `${window.location.protocol}//${window.location.host}${window.location.pathname}?seed=${newSeed}`;
    window.history.pushState({ path: newUrl }, '', newUrl);

    init(newSeed);
  });

  // Universal HTML Snippet Copier
  document.getElementById('btn-copy').addEventListener('click', function() {
    const exportData = JSON.stringify(window.exportData);
    const btn = this;

    // Self-contained blueprint template containing minimal engine setup
  const snippetCode = `<div id="fg-layer-container" style="position:fixed;top:0;left:0;width:100vw;height:100vh;overflow:hidden;z-index:-1;background:#020202;">
<canvas id="fg-layer-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;transform:scale(1.15);pointer-events:none;"></canvas>
<div id="fg-layer-overlay" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;mix-blend-mode:overlay;"></div>

<script>
(function () {

const data = ${exportData};

const canvas = document.getElementById('fg-layer-canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('fg-layer-overlay');

function render() {

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  canvas.style.filter = \`blur(\${data.blurAmount}px)\`;

  const rW = data.ridgeWidth;

  overlay.style.background = \`
    repeating-linear-gradient(
      to right,
      rgba(0,0,0,\${data.grooveOpacity}) 0px,
      rgba(0,0,0,0.05) \${rW * 0.3}px,
      rgba(255,255,255,\${data.specOpacity}) \${rW * 0.5}px,
      rgba(0,0,0,0.05) \${rW * 0.7}px,
      rgba(0,0,0,\${data.grooveOpacity}) \${rW}px
    )
  \`;

  overlay.style.backdropFilter =
    \`contrast(\${data.contrast}) brightness(\${data.brightness})\`;

  overlay.style.webkitBackdropFilter =
    overlay.style.backdropFilter;

  ctx.fillStyle = '#050508';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.globalCompositeOperation = 'screen';

  data.shapes.forEach(shape => {

    const x = shape.x;
    const y = shape.y;
    const rx = shape.rx;
    const ry = shape.ry;

    const h = shape.hue;
    const s = shape.sat;
    const l = shape.lit;

    let aura = ctx.createRadialGradient(
      x, y, 0,
      x, y, Math.max(rx, ry)
    );

    aura.addColorStop(0, \`hsla(\${h}, \${s}%, \${l}%, 1)\`);
    aura.addColorStop(0.4, \`hsla(\${h}, \${s}%, \${l}%, 0.8)\`);
    aura.addColorStop(1, \`hsla(\${h}, \${s}%, \${l}%, 0)\`);

    ctx.fillStyle = aura;

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(rx / 100, ry / 100);
    ctx.beginPath();
    ctx.arc(0, 0, 100, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    const cT = shape.coreThicknessRatio;
    const cO = shape.coreOpacity;

    let core = ctx.createRadialGradient(
      x, y, 0,
      x, y, Math.max(rx * cT, ry)
    );

    core.addColorStop(0, \`hsla(\${h},20%,95%,\${cO})\`);
    core.addColorStop(0.3, \`hsla(\${h},50%,80%,\${cO * 0.5})\`);
    core.addColorStop(1, \`hsla(\${h},\${s}%,\${l}%,0)\`);

    ctx.fillStyle = core;

    ctx.save();
    ctx.translate(x, y);
    ctx.scale((rx * cT) / 100, ry / 100);
    ctx.beginPath();
    ctx.arc(0, 0, 100, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

  });

}

window.addEventListener('resize', render);
render();

})();
<\/script>

</div>`;

    // Clipboard write API action
    const copyText = async () => {
  try {
    await navigator.clipboard.writeText(snippetCode);
    return true;
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = snippetCode;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  }
};

copyText().then(() => {
      const baseText = btn.innerText;
      btn.innerText = "Copied! ✓";
      btn.style.background = "#4caf50";
      btn.style.color = "#ffffff";
      setTimeout(() => {
        btn.innerText = baseText;
        btn.style.background = "";
        btn.style.color = "";
      }, 1800);
    }).catch(err => {
      console.error('Failed to copy text: ', err);
    });
  });

  window.addEventListener('resize', () => {
    init(seedInput.value);
  });

  window.addEventListener('popstate', updateFromURL);

  // Kickstart execution loop
  updateFromURL();
</script>
</body>
</html>
